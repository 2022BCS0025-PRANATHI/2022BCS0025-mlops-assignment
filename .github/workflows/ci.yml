name: CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: DVC Pull
        run: dvc pull || true

      - name: Train Model
        run: python src/train.py

      - name: Add Summary
        run: |
          echo "## Student Details" >> $GITHUB_STEP_SUMMARY
          echo "Name: Mantri Pranathi" >> $GITHUB_STEP_SUMMARY
          echo "Roll No: 2022BCS0025" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Metrics" >> $GITHUB_STEP_SUMMARY
          echo "Accuracy: $(jq .accuracy metrics.json)" >> $GITHUB_STEP_SUMMARY
          echo "F1 Score: $(jq .f1 metrics.json)" >> $GITHUB_STEP_SUMMARY
